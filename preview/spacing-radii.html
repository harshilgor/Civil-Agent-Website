<!doctype html><html><head><meta charset="utf-8">
<title>Spacing · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .block { display:flex; gap:20px; }
  .col { flex:1; }
  h4 { font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--on-surface-variant); margin:0 0 12px; font-weight:500; }
  .sp { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-family:var(--font-mono); font-size:11px; color:var(--on-surface-variant); }
  .sp b { display:inline-block; background:#313429; height:10px; }
  .rad { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-family:var(--font-mono); font-size:11px; color:var(--on-surface-variant); }
  .rad .sq { width:30px; height:30px; background:#5f5e5e; }
</style></head>
<body>
<div class="block">
  <div class="col">
    <h4>Spacing · 4/8 baseline</h4>
    <div class="sp"><b style="width:4px"></b>4 · sp-1</div>
    <div class="sp"><b style="width:8px"></b>8 · sp-2</div>
    <div class="sp"><b style="width:16px"></b>16 · sp-4</div>
    <div class="sp"><b style="width:24px"></b>24 · sp-6</div>
    <div class="sp"><b style="width:48px"></b>48 · sp-12</div>
  </div>
  <div class="col">
    <h4>Radii · prefer none/sm/md</h4>
    <div class="rad"><div class="sq" style="border-radius:0"></div>none · 0</div>
    <div class="rad"><div class="sq" style="border-radius:2px"></div>sm · 2px · default</div>
    <div class="rad"><div class="sq" style="border-radius:4px"></div>md · 4px</div>
    <div class="rad"><div class="sq" style="border-radius:8px;opacity:.6"></div>lg · 8px · overlays only</div>
    <div class="rad"><div class="sq" style="border-radius:12px;opacity:.3"></div>xl · banned on structural</div>
  </div>
</div>
</body></html>
