<!doctype html><html><head><meta charset="utf-8">
<title>Warning Block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .w { background:rgba(159,64,61,.05); border-left:2px solid #9f403d; padding:14px 16px; }
  .hd { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .hd .material-symbols-outlined { color:#9f403d; font-size:18px; font-variation-settings:"FILL" 1;}
  .tag { font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.14em; font-weight:700; color:#9f403d;}
  .msg { font-family:var(--font-body); font-size:13px; color:#313429; line-height:1.5;}
  .meta { font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--on-surface-variant); margin-top:10px;}
</style></head>
<body>
  <div class="w">
    <div class="hd"><span class="material-symbols-outlined">warning</span><span class="tag">Column Spacing</span></div>
    <div class="msg">Span at Grid C-4 exceeds 12m limit. Transfer beam required or additional support candidate.</div>
    <div class="meta">Rule · ASCE 7-22 · §12.8</div>
  </div>
</body></html>
