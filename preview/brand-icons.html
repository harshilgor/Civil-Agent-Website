<!doctype html><html><head><meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .grid { display:grid; grid-template-columns:repeat(8,1fr); gap:16px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .ic .material-symbols-outlined { font-size:28px; color:#5f5e5e; }
  .ic span.lbl { font-family:var(--font-label); font-size:9px; text-transform:uppercase; letter-spacing:.1em; color:var(--on-surface-variant);}
  .note { font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--on-surface-variant); margin-bottom:12px; font-weight:600;}
</style></head>
<body>
<div class="note">Material Symbols Outlined · weight 300 · fill 0</div>
<div class="grid">
  <div class="ic"><span class="material-symbols-outlined">dashboard</span><span class="lbl">dashboard</span></div>
  <div class="ic"><span class="material-symbols-outlined">account_tree</span><span class="lbl">graph</span></div>
  <div class="ic"><span class="material-symbols-outlined">grid_view</span><span class="lbl">zones</span></div>
  <div class="ic"><span class="material-symbols-outlined">map</span><span class="lbl">support</span></div>
  <div class="ic"><span class="material-symbols-outlined">summarize</span><span class="lbl">summary</span></div>
  <div class="ic"><span class="material-symbols-outlined">cloud_upload</span><span class="lbl">upload</span></div>
  <div class="ic"><span class="material-symbols-outlined">analytics</span><span class="lbl">analytics</span></div>
  <div class="ic"><span class="material-symbols-outlined">architecture</span><span class="lbl">plan</span></div>
  <div class="ic"><span class="material-symbols-outlined">view_in_ar</span><span class="lbl">3d</span></div>
  <div class="ic"><span class="material-symbols-outlined">layers</span><span class="lbl">layers</span></div>
  <div class="ic"><span class="material-symbols-outlined">terminal</span><span class="lbl">terminal</span></div>
  <div class="ic"><span class="material-symbols-outlined">settings</span><span class="lbl">settings</span></div>
  <div class="ic"><span class="material-symbols-outlined">warning</span><span class="lbl">warning</span></div>
  <div class="ic"><span class="material-symbols-outlined">check_circle</span><span class="lbl">ok</span></div>
  <div class="ic"><span class="material-symbols-outlined">info</span><span class="lbl">info</span></div>
  <div class="ic"><span class="material-symbols-outlined">tune</span><span class="lbl">tune</span></div>
</div>
</body></html>
