<!doctype html><html><head><meta charset="utf-8">
<title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background:var(--surface); display:flex; flex-direction:column; gap:18px;}
  .mark { font-family:var(--font-headline); font-weight:700; font-size:32px; letter-spacing:-.02em; color:#313429; }
  .mark .dim { color:#5f5e5e; font-weight:400; }
  .term { font-family:var(--font-headline); font-weight:700; font-size:22px; letter-spacing:.02em; color:#313429; text-transform:uppercase; }
  .tag { font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.2em; color:var(--on-surface-variant); margin-top:-4px;}
</style></head>
<body>
  <div>
    <div class="mark">Vellum <span class="dim">Structures</span></div>
    <div class="tag">Editorial treatment · Space Grotesk 700</div>
  </div>
  <div>
    <div class="term">VELLUM_STRUCTURES</div>
    <div class="tag">Terminal treatment · used in-app</div>
  </div>
</body></html>
