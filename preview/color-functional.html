<!doctype html><html><head><meta charset="utf-8">
<title>Color — Functional Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--surface); }
  .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
  .acc { padding:10px; display:flex; flex-direction:column; gap:4px; min-height:100px; }
  .dot { width:22px;height:22px; border-radius:2px; }
  .name { font-family:var(--font-headline); font-size:12px; font-weight:600; color:var(--on-surface); }
  .use  { font-family:var(--font-label); font-size:9px; text-transform:uppercase; letter-spacing:.14em; color:var(--on-surface-variant); }
  .hex  { font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); margin-top:auto; }
  .acc { background:var(--surface-container-low); }
</style></head>
<body>
<div class="grid">
  <div class="acc"><div class="dot" style="background:#006a6a"></div><div class="name">Teal</div><div class="use">Structural spine</div><div class="hex">#006a6a</div></div>
  <div class="acc"><div class="dot" style="background:#6a4c93"></div><div class="name">Purple</div><div class="use">Plates · voids</div><div class="hex">#6a4c93</div></div>
  <div class="acc"><div class="dot" style="background:#b5548c"></div><div class="name">Pink</div><div class="use">Pedestrian flow</div><div class="hex">#b5548c</div></div>
  <div class="acc"><div class="dot" style="background:#c2615b"></div><div class="name">Coral</div><div class="use">Transfer risk</div><div class="hex">#c2615b</div></div>
  <div class="acc"><div class="dot" style="background:#3c6e91"></div><div class="name">Blue</div><div class="use">Info · metadata</div><div class="hex">#3c6e91</div></div>
  <div class="acc"><div class="dot" style="background:#9f403d"></div><div class="name">Error</div><div class="use">Safety threshold</div><div class="hex">#9f403d</div></div>
</div>
</body></html>
