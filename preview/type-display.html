<!doctype html><html><head><meta charset="utf-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--surface); }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .spec  { font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--on-surface-variant); }
  .big { font-family:var(--font-headline); font-weight:700; color:var(--on-surface); letter-spacing:-.02em; line-height:1; }
</style></head>
<body>
<div class="stack">
  <div>
    <div class="spec">Display LG · Space Grotesk 700 · 56px</div>
    <div class="big" style="font-size:56px">84.2%</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div class="big" style="font-size:44px">3,850</div>
    <div class="spec">m² total area</div>
  </div>
</div>
</body></html>
