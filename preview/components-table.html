<!doctype html><html><head><meta charset="utf-8">
<title>Table · Data List</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:var(--surface); }
  table { width:100%; border-collapse: separate; border-spacing:0; font-family:var(--font-body); font-size:12px; color:#313429;}
  th { text-align:left; padding:10px 14px; background:#f5f4eb; font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--on-surface-variant); font-weight:700;}
  td { padding:12px 14px; border-bottom:.5px solid rgba(49,52,41,.08);}
  tr.alt td { background:#faf9f2; }
  .name { font-weight:700;}
  .sub { font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--on-surface-variant);}
  .bar { display:inline-block; width:40px; height:3px; background:#e9e9dc; position:relative; margin-right:8px; vertical-align:middle;}
  .bar i { display:block; height:100%; background:#006a6a;}
  .num { font-family:var(--font-headline); font-weight:700;}
</style></head>
<body>
<table>
  <thead><tr><th>Project</th><th>Source</th><th>Score</th><th>Status</th></tr></thead>
  <tbody>
    <tr><td><div class="name">Nexus Spine</div><div class="sub">High-Rise</div></td><td>IFC Binary</td><td><span class="bar"><i style="width:98%"></i></span><span class="num">98%</span></td><td style="color:#4a7c59">Complete</td></tr>
    <tr class="alt"><td><div class="name">Cantilever Garden</div><div class="sub">Pavilion</div></td><td>DXF Plot</td><td><span class="bar"><i style="width:45%;background:#b8842b"></i></span><span class="num">45%</span></td><td style="color:#b8842b">Processing</td></tr>
    <tr><td><div class="name">Void-Form Core V2</div><div class="sub">Modular</div></td><td>Image Scan</td><td><span class="bar"><i style="width:82%;background:#9f403d"></i></span><span class="num">82%</span></td><td style="color:#9f403d">Needs Review</td></tr>
  </tbody>
</table>
</body></html>
